    <style>
        .mushroom-photo {
            width: 100%;
            max-height: 420px;
            object-fit: cover;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .answer-button {
            min-height: 110px;
            padding: 1.25rem;
            border: 2px solid #d7e8db;
            border-radius: 1rem;
            background: #f7fbf8;
            color: #173c2b;
            font-size: 1.1rem;
            font-weight: 600;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
        }

        .answer-button:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: #7aa98a;
            box-shadow: 0 0.75rem 1.5rem rgba(36, 79, 55, 0.12);
        }

        .answer-button:disabled {
            cursor: default;
            opacity: 1;
        }

        .answer-button.correct {
            border-color: #198754;
            background: #d1e7dd;
            color: #0f5132;
        }

        .answer-button.incorrect {
            border-color: #dc3545;
            background: #f8d7da;
            color: #842029;
        }

        @media (max-width: 576px) {
            .answer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

        function extractSpeciesName(imagePath) {
            const filename = imagePath.split("/").pop() || "";
            const nameWithoutExtension = filename.replace(/\.(jpg|jpeg|png)$/i, "");
            const rawSpeciesName = nameWithoutExtension.replace(/\s+\d+$/, "").trim();
            const normalizedKey = rawSpeciesName.toLowerCase();

            return speciesAliases[normalizedKey] || rawSpeciesName;
        }

        function shuffle(items) {
            const copy = [...items];

            for (let index = copy.length - 1; index > 0; index -= 1) {
                const randomIndex = Math.floor(Math.random() * (index + 1));
                [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
            }

            return copy;
        }

        function buildChoices(correctAnswer) {
            const distractors = shuffle(
                mushroomSpecies.filter((species) => species !== correctAnswer)
            ).slice(0, 3);

            return shuffle([correctAnswer, ...distractors]);
        }

        function renderQuizRound() {
            const imageContainer = document.getElementById("mushroom-image-container");
            const answerGrid = document.getElementById("answer-grid");
            const feedback = document.getElementById("quiz-feedback");
            const randomImage = mushroomImages[Math.floor(Math.random() * mushroomImages.length)];
            const correctAnswer = extractSpeciesName(randomImage);
            const choices = buildChoices(correctAnswer);

            feedback.className = "fw-semibold mt-4";
            feedback.textContent = "Choose the mushroom name.";

            imageContainer.innerHTML = `
                <img
                    src="${randomImage}"
                    alt="Mushroom to identify"
                    class="mushroom-photo img-fluid rounded-4 shadow-sm"
                >
            `;

            answerGrid.innerHTML = "";

            choices.forEach((choice) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "answer-button shadow-sm";
                button.textContent = choice;

                button.addEventListener("click", () => {
                    const buttons = answerGrid.querySelectorAll("button");
                    const isCorrect = choice === correctAnswer;

                    buttons.forEach((answerButton) => {
                        answerButton.disabled = true;

                        if (answerButton.textContent === correctAnswer) {
                            answerButton.classList.add("correct");
                        } else if (answerButton === button && !isCorrect) {
                            answerButton.classList.add("incorrect");
                        }
                    });

                    feedback.className = `fw-semibold mt-4 ${isCorrect ? "text-success" : "text-danger"}`;
                    feedback.textContent = isCorrect
                        ? "Correct! Nice one."
                        : `Not quite. The correct answer was ${correctAnswer}.`;
                });

                answerGrid.appendChild(button);
            });
        }

        document.getElementById("next-button").addEventListener("click", renderQuizRound);

        renderQuizRound();
